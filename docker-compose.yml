# docker-compose.yml — GPU-enabled dev container for GRPO training.
# Usage:
#   docker compose up -d        → start container
#   docker compose exec dev bash → open shell
#   docker compose down          → stop

services:
  dev:
    build: .
    container_name: grpo-dev
    volumes:
      - .:/workspace # bind-mount: edits sync to host
    working_dir: /workspace
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
