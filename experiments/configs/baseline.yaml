# Baseline evaluation config — evaluate off-the-shelf LLMs without fine-tuning.

model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  quantization: "4bit" # "4bit", "8bit", or "none"
  dtype: "bfloat16"
  use_unsloth: true # 2-5x faster training + less VRAM on Colab
  fast_inference: true # true = usa vLLM interno per generazione veloce (solo Linux)

dataset:
  path: "data/synthetic"
  split: "test"
  max_samples: null # null = use all

generation:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.95
  do_sample: true
  num_return_sequences: 1 # increase for Pass@k with k > 1

evaluation:
  pass_at_k: [1, 5, 10]
  output_dir: "experiments/logs/baseline"

wandb:
  project: "grpo-strict-generation"
  run_name: null
  tags: ["baseline", "Qwen2.5-0.5B"]
