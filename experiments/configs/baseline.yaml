# ============================================================================
# Baseline evaluation config — valuta il modello base senza fine-tuning.
#
# Usato da:  python -m src.evaluation.baseline_eval --config experiments/configs/baseline.yaml
# ============================================================================

# --- Modello ---
# NB: per la baseline NON serve la sezione "lora" — il modello viene caricato senza adapters.
model:
  name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0" # nome HuggingFace Hub del modello
  quantization: "4bit" # quantizzazione: "4bit", "8bit", o null (nessuna)
  dtype: "bfloat16" # tipo di dato: "bfloat16", "float16", "float32"
  use_unsloth: true # true = carica con Unsloth; false = HuggingFace standard
  fast_inference: true # true = usa vLLM per generazione veloce
  max_seq_length: 2048 # lunghezza massima sequenza (Unsloth)
  gpu_memory_utilization: 0.9 # frazione VRAM per vLLM (0.9 ok per eval, 0.75 se OOM)

# --- Dataset ---
dataset:
  path: "data/synthetic" # percorso del DatasetDict salvato su disco
  split: "test" # split da usare per l'evaluation
  max_samples: null # null = usa tutti; numero intero = tronca a N samples

# --- Parametri di generazione ---
generation:
  max_new_tokens: 512 # numero massimo di token generati per prompt
  temperature: 0.7 # temperatura di campionamento (0 = greedy)
  top_p: 0.95 # nucleus sampling — probabilità cumulativa massima
  do_sample: true # true = campionamento stocastico; false = greedy
  num_return_sequences: 1 # completions per prompt (aumenta per pass@k con k > 1)

# --- Evaluation ---
evaluation:
  pass_at_k: [1, 5, 10] # valori di k per la metrica pass@k (utile se num_return_sequences > 1)
  output_dir: "experiments/logs/baseline" # cartella dove salvare results.json e completions.json

# --- Weights & Biases ---
wandb:
  project: "grpo-strict-generation" # nome del progetto su wandb
  run_name: null # nome del run (null = auto: "baseline-<model>")
  tags: ["baseline", "TinyLlama-1.1B"] # tag per filtrare i run
