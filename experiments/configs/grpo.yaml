# GRPO training config — Group Relative Policy Optimization via trl.

model:
  name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
  quantization: "4bit"
  dtype: "bfloat16"
  use_unsloth: true
  fast_inference: true # vLLM backend per generazione veloce
  max_seq_length: 2048
  gpu_memory_utilization: 0.75 # standby mode richiede ~0.75 su T4 (0.9 causa OOM)

lora:
  r: 16
  lora_alpha: 16 # lora_alpha = r (da notebook Unsloth ufficiali)
  lora_dropout: 0 # 0 consigliato da Unsloth con gradient checkpointing
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"
  random_state: 3407

dataset:
  path: "data/synthetic"
  split: "train"
  max_samples: null

training:
  max_steps: 300
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  optim: "paged_adamw_8bit"
  weight_decay: 0.1
  max_grad_norm: 0.1
  bf16: true
  logging_steps: 5
  save_steps: 60
  save_total_limit: 3
  output_dir: "experiments/checkpoints/grpo"
  log_dir: "experiments/logs/grpo"

grpo:
  num_generations: 8 # group size G — reduce to 4 if OOM
  max_completion_length: 512
  max_prompt_length: 256
  beta: 0.04 # KL penalty coefficient
  temperature: 0.7

reward:
  weight_format: 0.10 # proper ```json block
  weight_validity: 0.30 # JSON parses without error (graduated)
  weight_schema: 0.50 # structural compliance with the prompt constraints
  weight_reasoning: 0.10 # bonus for <think>...</think> with real content

wandb:
  project: "grpo-strict-generation"
  run_name: null # null = auto-generated
  tags: ["grpo", "TinyLlama-1.1B", "json-only"]
