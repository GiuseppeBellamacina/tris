# GRPO training config — Group Relative Policy Optimization via trl.

model:
  name: "Qwen/Qwen2.5-Coder-1.5B-Instruct"
  quantization: "4bit"
  dtype: "bfloat16"
  use_unsloth: true # 2-5x faster training + less VRAM on Colab

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  task_type: "CAUSAL_LM"

dataset:
  path: "data/synthetic"
  split: "train"
  max_samples: null

training:
  max_steps: 1000
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-6
  lr_scheduler_type: "cosine"
  warmup_steps: 50
  bf16: true
  logging_steps: 10
  save_steps: 200
  save_total_limit: 3
  output_dir: "experiments/checkpoints/grpo"
  log_dir: "experiments/logs/grpo"

grpo:
  num_generations: 8 # group size G — reduce to 4 if OOM
  max_completion_length: 512
  max_prompt_length: 256
  beta: 0.04 # KL penalty coefficient
  temperature: 0.7
  use_vllm: false # vLLM non disponibile su Colab free, Unsloth basta

reward:
  partial_credit: true # scala graduale 0.0 / 0.25 / 0.5 / 0.75 / 1.0
  reasoning_bonus: 0.0 # set > 0 for dual-reward (Extra Obj. 2)

wandb:
  project: "grpo-strict-generation"
  run_name: null # null = auto-generated
  tags: ["grpo", "Qwen2.5-Coder-1.5B", "json-only"]
