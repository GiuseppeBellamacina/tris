# ============================================================================
# GRPO training config — Group Relative Policy Optimization via trl.
#
# Usato da:  python -m src.training.grpo_train --config experiments/configs/grpo.yaml
# ============================================================================

# --- Modello ---
model:
  name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0" # nome HuggingFace Hub del modello
  num_gpus: 1 # numero di GPU (>1 = multi-GPU con DDP, disabilita automaticamente Unsloth e fast_inference)
  quantization: "4bit" # quantizzazione: "4bit", "8bit", o null (nessuna)
  dtype: "bfloat16" # tipo di dato: "bfloat16", "float16", "float32"
  use_unsloth: true # true = backend Unsloth (più veloce, meno VRAM)
  fast_inference: true # true = usa vLLM per generazione veloce durante i rollout
  max_seq_length: 2048 # lunghezza massima sequenza per il modello (Unsloth)
  gpu_memory_utilization: 0.75 # frazione VRAM per vLLM (0.75 su T4, 0.9 su A100)

# --- LoRA adapters ---
# Se questa sezione è assente, il modello viene caricato senza adapters (baseline).
lora:
  r: 16 # rango LoRA (dimensione delle matrici low-rank)
  lora_alpha: 32 # fattore di scala LoRA (alpha = 2*r per scaling più forte)
  lora_dropout: 0 # dropout LoRA (0 consigliato con gradient checkpointing)
  target_modules: # layer a cui applicare LoRA
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM" # tipo di task per PEFT
  random_state: 3407 # seed per inizializzazione LoRA

# --- Dataset ---
dataset:
  path: "data/synthetic" # percorso del DatasetDict salvato su disco
  split: "train" # split da usare: "train" o "test"
  max_samples: null # null = usa tutti; numero intero = tronca a N samples
  thinking: false # true = system prompt con <think>...</think>; false = solo JSON puro

# --- Iperparametri di training ---
training:
  max_steps: 600 # numero totale di step di ottimizzazione
  per_device_train_batch_size: 1 # batch size per GPU (1 consigliato con GRPO)
  gradient_accumulation_steps: 8 # accumula gradienti su N step prima di aggiornare
  learning_rate: 5.0e-6 # learning rate iniziale
  lr_scheduler_type: "cosine" # scheduler: "cosine", "linear", "constant", ecc.
  warmup_ratio: 0.1 # frazione di step per il warmup (alternativa: warmup_steps)
  # warmup_steps: 50             # numero fisso di step di warmup (usa UNO tra ratio e steps)
  optim: "paged_adamw_8bit" # ottimizzatore: "paged_adamw_8bit", "adamw_torch", ecc.
  weight_decay: 0.1 # regolarizzazione L2
  max_grad_norm: 0.1 # gradient clipping (norma massima)
  bf16: true # true = mixed precision bfloat16 (richiede GPU >= Ampere)
  logging_steps: 5 # logga metriche ogni N step
  save_steps: 60 # salva checkpoint ogni N step
  save_total_limit: 3 # mantieni al massimo N checkpoint su disco
  output_dir: "experiments/checkpoints/grpo" # cartella per i checkpoint
  log_dir: "experiments/logs/grpo" # cartella per i log di TensorBoard/wandb

# --- Parametri GRPO ---
grpo:
  num_generations: 4 # G = dimensione del gruppo per i rollout (ridotto da 8 per bilanciare VRAM con max_completion_length più alto)
  max_completion_length: 768 # lunghezza massima delle completion generate (alzato da 512 per ridurre clipped_ratio)
  max_prompt_length: 512 # lunghezza massima del prompt (troncato se più lungo)
  beta: 0.04 # coefficiente penalty KL (regola quanto il modello può divergere)
  temperature: 0.9 # temperatura di campionamento durante i rollout (più diversità nel gruppo)

# --- Pesi della reward function ---
# Conta il rapporto relativo tra i pesi, non la somma assoluta.
reward:
  weight_format: 0.20 # presenza di un blocco ```json ... ``` corretto (componente additiva; 0.5 per ``` generico)
  weight_validity: 0.35 # JSON parsabile senza errori (punteggio graduato)
  weight_schema: 0.35 # conformità strutturale ai vincoli del prompt
  weight_reasoning: 0.10 # bonus per <think>...</think> con contenuto reale (ora allineato al system prompt)
  # weight_truncation: 0.15   # penalità per completion troncate (range [-1, +1])

# --- Curriculum Learning (opzionale) ---
# Decommentare per abilitare il training multi-stage con difficoltà progressiva.
# Quando abilitato, training.max_steps è ignorato (si usano gli step per stage).
# Il dataset di training viene rigenerato in memoria per ogni stage — il dataset
# su disco (dataset.path) è usato solo per il test split durante l'evaluation.
# curriculum:
#   enabled: true
#   num_samples: 4000           # campioni di training rigenerati per stage
#   stages:
#     - name: "format_basics"
#       steps: 300
#       difficulty_weights:
#         simple: 0.35
#         medium: 0.55
#         hard: 0.10
#     - name: "full_difficulty"
#       steps: 300
#       difficulty_weights:
#         simple: 0.10
#         medium: 0.30
#         hard: 0.60

# --- Weights & Biases ---
wandb:
  project: "grpo-strict-generation" # nome del progetto su wandb
  run_name: "grpo-tinyllama" # nome del run
  tags: ["grpo", "TinyLlama-1.1B", "json-only"] # tag per filtrare i run
