# ============================================================================
# GRPO training config — Cluster DMI (L40S / gpu-xlarge)
#
# L40S (CC 8.9, 48 GB VRAM): bf16 ✅, Unsloth ✅, vLLM ✅, 4-bit ✅
# Con gpu-xlarge shard:22000 → 22 GB VRAM disponibili
# TinyLlama 1.1B 4-bit ≈ 1.5 GB → ampio margine per rollout grandi
# SmolLM2 360M 4-bit ≈ 0.5 GB → margine ancora più ampio
#
# Usato da:  python -m src.training --config experiments/configs/grpo_cluster.yaml
# ============================================================================

# --- Modello ---
model:
  name: "HuggingFaceTB/SmolLM2-360M-Instruct"
  num_gpus: 1
  quantization: "4bit" # ✅ NF4 supportato su L40S
  dtype: "bfloat16" # ✅ L40S supporta bfloat16
  use_unsloth: true # ✅ Unsloth per training 2x più veloce
  fast_inference: true # ✅ vLLM per rollout veloci
  max_seq_length: 2048
  gpu_memory_utilization: 0.45 # ⚠️ SLURM shard=22GB su 44.5GB GPU → max ~20GB per vLLM

# --- LoRA adapters ---
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"
  random_state: 3407

# --- Dataset ---
dataset:
  path: "data/synthetic"
  split: "train"
  max_samples: null
  thinking: false

# --- Iperparametri di training ---
training:
  max_steps: 600
  per_device_train_batch_size: 2 # TODO: prova con 2
  gradient_accumulation_steps: 4 # TODO: prova con 4
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  optim: "paged_adamw_8bit" # ✅ optimizer 8-bit per risparmiare VRAM
  weight_decay: 0.1
  max_grad_norm: 0.1
  bf16: true # ✅ mixed precision bfloat16
  logging_steps: 5
  save_steps: 60
  save_total_limit: 3
  output_dir: "experiments/checkpoints/grpo"
  log_dir: "experiments/logs/grpo"

# --- Parametri GRPO ---
grpo:
  num_generations: 8 # L40S: più rollout paralleli → stime GRPO migliori
  max_completion_length: 768 # completions più lunghe per ridurre clipping
  max_prompt_length: 512
  beta: 0.04
  temperature: 0.9

# --- Pesi della reward function ---
reward:
  weight_format: 0.20
  weight_validity: 0.35
  weight_schema: 0.35
  weight_reasoning: 0.10

# --- Weights & Biases ---
wandb:
  project: "grpo-strict-generation"
  run_name: "grpo-smollm2-360m-cluster"
  tags: ["grpo", "SmolLM2-360M", "json-only", "cluster-l40s"]
