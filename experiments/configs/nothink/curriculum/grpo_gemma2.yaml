# ============================================================================
# GRPO training config — Gemma-2-2B-it — Cluster DMI (L40S)
#
# Gemma 2 2B 4-bit ≈ 2 GB. fast_inference (vLLM) attivo con
# gpu_memory_utilization=0.30 e vllm_standby per restare entro la VRAM.
#
# Usato da:
#   CONFIG=experiments/configs/nothink/curriculum/grpo_gemma2.yaml sbatch cluster/train.sh
#   CONFIG=experiments/configs/nothink/curriculum/grpo_gemma2.yaml CURRICULUM=1 sbatch cluster/eval.sh
# ============================================================================

# --- Modello ---
model:
  name: "google/gemma-2-2b-it"
  num_gpus: 1
  quantization: "4bit"
  dtype: "bfloat16"
  use_unsloth: true
  fast_inference: true
  max_seq_length: 2048
  gpu_memory_utilization: 0.35
  vllm_standby: false

# --- LoRA adapters ---
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"
  random_state: 3407

# --- Dataset ---
dataset:
  path: "data/synthetic"
  split: "train"
  max_samples: null
  thinking: false

# --- Iperparametri di training ---
training:
  max_steps: 2500
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  optim: "paged_adamw_8bit"
  weight_decay: 0.1
  max_grad_norm: 0.1
  bf16: true
  logging_steps: 5
  save_steps: 60
  save_total_limit: 3
  output_dir: "experiments/checkpoints/grpo/nothink/curriculum/gemma2-2b"
  log_dir: "experiments/logs/grpo/nothink/curriculum/gemma2-2b"

# --- Parametri GRPO ---
grpo:
  num_generations: 8
  max_completion_length: 1024
  max_prompt_length: 512
  beta: 0.04
  temperature: 0.7

# --- Pesi della reward function ---
reward:
  weight_format: 0.20
  weight_validity: 0.25
  weight_schema: 0.25
  weight_truncation: 0.10
  weight_reasoning: 0.0
  weight_repetition: 0.10
  weight_strictness: 0.10

# --- Curriculum Learning ---
curriculum:
  enabled: true
  num_samples: 1500
  eval_dataset:
    num_samples: 999
    difficulty_weights:
      simple: 0.334
      medium: 0.333
      hard: 0.333
  stages:
    - name: "format_basics"
      steps: 800
      difficulty_weights:
        simple: 0.35
        medium: 0.55
        hard: 0.10
      temperature: 0.8
    - name: "progressive"
      steps: 800
      difficulty_weights:
        simple: 0.15
        medium: 0.35
        hard: 0.50
    - name: "full_difficulty"
      steps: 900
      difficulty_weights:
        simple: 0.10
        medium: 0.25
        hard: 0.65
      temperature: 0.6

# --- Evaluation ---
evaluation:
  batch_size: 8

# --- Weights & Biases ---
wandb:
  project: "grpo-strict-generation"
  run_name: "grpo-gemma2-2b-curriculum"
  tags: ["grpo", "Gemma-2-2B", "cluster-l40s", "curriculum", "nothink"]
