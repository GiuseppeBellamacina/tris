# SFT training config — Supervised Fine-Tuning for comparison with GRPO.

model:
  name: "Qwen/Qwen2.5-Coder-0.5B-Instruct"
  quantization: "4bit"
  dtype: "bfloat16"
  use_unsloth: true
  fast_inference: true
  max_seq_length: 2048
  gpu_memory_utilization: 0.9

lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"
  random_state: 3407

dataset:
  path: "data/synthetic"
  split: "train"
  max_samples: null

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  warmup_steps: 50
  optim: "paged_adamw_8bit"
  weight_decay: 0.1
  bf16: true
  logging_steps: 10
  save_steps: 200
  save_total_limit: 3
  max_seq_length: 768
  output_dir: "experiments/checkpoints/sft"
  log_dir: "experiments/logs/sft"

wandb:
  project: "grpo-strict-generation"
  run_name: null
  tags: ["sft", "Qwen2.5-Coder-0.5B"]
