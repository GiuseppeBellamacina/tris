# ============================================================================
# GRPO training config — SmolLM2-360M-Instruct — THINK + STANDARD variant
#
# Come think/curriculum ma senza curriculum learning (training diretto).
#   - dataset.thinking: true  → system prompt chiede <think>...</think>
#   - weight_reasoning: 0.25  → incentivo al ragionamento
#   - max_completion_length +512  → spazio extra per il blocco think
#   - curriculum: enabled: false
#
# Usato da:
#   CONFIG=experiments/configs/think/standard/grpo_smollm2_360m.yaml sbatch cluster/train.sh
#   CONFIG=experiments/configs/think/standard/grpo_smollm2_360m.yaml sbatch cluster/eval.sh
# ============================================================================

# --- Modello ---
model:
  name: "HuggingFaceTB/SmolLM2-360M-Instruct"
  num_gpus: 1
  quantization: "4bit"
  dtype: "bfloat16"
  use_unsloth: true
  fast_inference: true
  max_seq_length: 2048
  gpu_memory_utilization: 0.45

# --- LoRA adapters ---
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"
  random_state: 3407

# --- Dataset ---
dataset:
  path: "data/synthetic"
  split: "train"
  max_samples: null
  thinking: true

# --- Iperparametri di training ---
training:
  max_steps: 2500
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  optim: "paged_adamw_8bit"
  weight_decay: 0.1
  max_grad_norm: 0.1
  bf16: true
  logging_steps: 5
  save_steps: 60
  save_total_limit: 3
  output_dir: "experiments/checkpoints/grpo/think/smollm2-360m"
  log_dir: "experiments/logs/grpo/think/smollm2-360m"

# --- Parametri GRPO ---
grpo:
  num_generations: 8
  max_completion_length: 1536
  max_prompt_length: 512
  beta: 0.04
  temperature: 0.7

# --- Pesi della reward function ---
reward:
  weight_format: 0.10
  weight_validity: 0.15
  weight_schema: 0.20
  weight_truncation: 0.10
  weight_reasoning: 0.25
  weight_repetition: 0.10
  weight_strictness: 0.10

# --- Curriculum Learning ---
curriculum:
  enabled: false

# --- Evaluation ---
evaluation:
  batch_size: 8

# --- Weights & Biases ---
wandb:
  project: "grpo-strict-generation"
  run_name: "grpo-smollm2-360m-think-standard"
  tags: ["grpo", "SmolLM2-360M", "cluster-l40s", "standard", "thinking"]
